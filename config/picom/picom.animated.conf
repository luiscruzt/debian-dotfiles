#################################
#       General Settings        #
#################################
backend = "glx";
xrender-sync-fence = true;
vsync = true;
use-damage = true;

#################################
#       Visual Depth            #
#################################
shadow = true;
shadow-radius = 18;
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-opacity = 0.40;
shadow-exclude = [ "name = 'Notification'", "class_g = 'Polybar'", "_GTK_FRAME_EXTENTS@:c" ];

blur-background = true;
blur-method = "dual_kawase";
blur-strength = 6;
blur-background-exclude = [ "window_type = 'dock'", "_GTK_FRAME_EXTENTS@:c" ];

#################################
#       Geometry & Opacity      #
#################################
corner-radius = 0;

active-opacity = 1.0;
inactive-opacity = 0.95;
frame-opacity = 1.0;
inactive-opacity-override = false;

#################################
#       Fading                  #
#################################
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 8;
no-fading-openclose = false;

#################################
#       Animations              #
#################################
animations = (
        {
        triggers = ["close", "hide"];
        opacity = {
        curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)";
        duration = 0.15;
        start = "window-raw-opacity-before";
        end = 0;
        };
        blur-opacity = "opacity";
        shadow-opacity = "opacity";

        offset-x = "(1 - scale-x) / 2 * window-width";
        offset-y = "(1 - scale-y) / 2 * window-height";

        scale-x = {
        curve = "cubic-bezier(0.4, 0.0, 1.0, 1.0)";
        duration = 0.15;
        start = 1;
        end = 0.92;
        };
        scale-y = "scale-x";

        shadow-scale-x = "scale-x";
        shadow-scale-y = "scale-y";
        shadow-offset-x = "offset-x";
        shadow-offset-y = "offset-y";
        },
{
    triggers = ["open", "show"];
    opacity = {
        curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
        duration = 0.20;
        start = 0;
        end = "window-raw-opacity";
    };
    blur-opacity = "opacity";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height";
    scale-x = {
        curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
        duration = 0.20;
        start = 0.92;
        end = 1;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
},
{
    triggers = ["geometry"]
        scale-x = {
            curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
            duration = 0.20;
            start = "window-width-before / window-width";
            end = 1;
        }
    scale-y = {
        curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
        duration = 0.20;
        start = "window-height-before / window-height";
        end = 1;
    }
    offset-x = {
        curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
        duration = 0.20;
        start = "window-x-before - window-x";
        end = 0;
    }
    offset-y = {
        curve = "cubic-bezier(0.0, 0.0, 0.2, 1.0)";
        duration = 0.20;
        start = "window-y-before - window-y";
        end = 0;
    }
}
)
