# ~/.config/i3/status/themes/catppuccin.conf

general {
    output_format = "i3bar"
    markup = "pango"
    interval = 1
    colors = false
}

order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
# order += "battery all"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#74c7ec'>󰍛  %usage</span>"
}

cpu_temperature 0 {
    format = "<span foreground='#fab387'>󰔏  %degrees°C</span>"
    max_threshold = 75
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

memory {
    format = "<span foreground='#a6e3a1'>󰘚  %used/%total (%percentage_used)</span>"
}

disk "/" {
    format = "<span foreground='#f9e2af'>/:  %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#f9e2af'>/home:  %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    format_up = "<span foreground='#94e2d5'>󰈀  %ip</span>"
    format_down = "<span foreground='#f38ba8'>󰈀  down</span>"
}

# wireless _first_ {
#     format_up = "<span foreground='#94e2d5'>󰖩  %ip (%quality)</span>"
#     format_down = "<span foreground='#f38ba8'>󰖩  down</span>"
# }

# battery all {
#     format = "<span foreground='#f5c2e7'>%status  %percentage %remaining</span>"
#     format_down = "<span foreground='#f38ba8'>No battery</span>"
#     status_chr = "󰂄"
#     status_bat = "󰁹"
#     status_unk = "󰂑"
#     status_full = "󰁹"
#     low_threshold = 20
#     threshold_type = percentage
# }

volume master {
    format = "<span foreground='#cba6f7'>󰕾  %volume</span>"
    format_muted = "<span foreground='#585b70'>󰝟  MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#b4befe'>󰃭  %a %d %b   󱑒  %H:%M:%S  </span>"
}
