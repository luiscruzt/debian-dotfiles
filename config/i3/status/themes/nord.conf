# ~/.config/i3/status/themes/nord.conf

general {
    output_format = "i3bar"
    markup = "pango"
    interval = 1
    colors = false
}

order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
# order += "battery all"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#88C0D0'>󰍛  %usage</span>"
}

cpu_temperature 0 {
    format = "<span foreground='#5E81AC'>󰔏  %degrees°C</span>"
    max_threshold = 75
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

memory {
    format = "<span foreground='#81A1C1'>󰘚  %used/%total (%percentage_used)</span>"
}

disk "/" {
    format = "<span foreground='#EBCB8B'>/:  %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#EBCB8B'>/home:  %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    format_up = "<span foreground='#A3BE8C'>󰈀  %ip</span>"
    format_down = "<span foreground='#BF616A'>󰈀  down</span>"
}

# wireless _first_ {
#     format_up = "<span foreground='#A3BE8C'>󰖩  %ip (%quality)</span>"
#     format_down = "<span foreground='#BF616A'>󰖩  down</span>"
# }

# battery all {
#     format = "<span foreground='#D08770'>%status  %percentage %remaining</span>"
#     format_down = "<span foreground='#BF616A'>No battery</span>"
#     status_chr = "󰂄"
#     status_bat = "󰁹"
#     status_unk = "󰂑"
#     status_full = "󰁹"
#     low_threshold = 20
#     threshold_type = percentage
# }

volume master {
    format = "<span foreground='#B48EAD'>󰕾  %volume</span>"
    format_muted = "<span foreground='#4C566A'>󰝟  MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#ECEFF4'>󰃭  %a %d %b   󱑒  %H:%M:%S  </span>"
}
