# ~/.config/i3/status/themes/solarized.conf

general {
    output_format = "i3bar"
    markup = "pango"
    interval = 1
    colors = false
}

order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
# order += "battery all"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#268bd2'>󰍛  %usage</span>"
}

cpu_temperature 0 {
    format = "<span foreground='#cb4b16'>󰔏  %degrees°C</span>"
    max_threshold = 75
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

memory {
    format = "<span foreground='#859900'>󰘚  %used/%total (%percentage_used)</span>"
}

disk "/" {
    format = "<span foreground='#b58900'>/:  %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#b58900'>/home:  %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    format_up = "<span foreground='#2aa198'>󰈀  %ip</span>"
    format_down = "<span foreground='#dc322f'>󰈀  down</span>"
}

# wireless _first_ {
#     format_up = "<span foreground='#2aa198'>󰖩  %ip (%quality)</span>"
#     format_down = "<span foreground='#dc322f'>󰖩  down</span>"
# }

# battery all {
#     format = "<span foreground='#859900'>%status  %percentage %remaining</span>"
#     format_down = "<span foreground='#dc322f'>No battery</span>"
#     status_chr = "󰂄"
#     status_bat = "󰁹"
#     status_unk = "󰂑"
#     status_full = "󰁹"
#     low_threshold = 20
#     threshold_type = percentage
# }

volume master {
    format = "<span foreground='#6c71c4'>󰕾  %volume</span>"
    format_muted = "<span foreground='#586e75'>󰝟  MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#93a1a1'>󰃭  %a %d %b   󱑒  %H:%M:%S  </span>"
}
