# ~/.config/i3/status/themes/monochrome.conf

general {
    output_format = "i3bar"
    markup = "pango"
    interval = 1
    colors = false
}

order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
# order += "battery all"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#FFFFFF'>󰍛  %usage</span>"
}

cpu_temperature 0 {
    format = "<span foreground='#E0E0E0'>󰔏  %degrees°C</span>"
    max_threshold = 75
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

memory {
    format = "<span foreground='#FFFFFF'>󰘚  %used/%total (%percentage_used)</span>"
}

disk "/" {
    format = "<span foreground='#C0C0C0'>/:  %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#C0C0C0'>/home:  %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    format_up = "<span foreground='#A0A0A0'>󰈀  %ip</span>"
    format_down = "<span foreground='#808080'>󰈀  down</span>"
}

# wireless _first_ {
#     format_up = "<span foreground='#A0A0A0'>󰖩  %ip (%quality)</span>"
#     format_down = "<span foreground='#808080'>󰖩  down</span>"
# }

# battery all {
#     format = "<span foreground='#FFFFFF'>%status  %percentage %remaining</span>"
#     format_down = "<span foreground='#808080'>No battery</span>"
#     status_chr = "󰂄"
#     status_bat = "󰁹"
#     status_unk = "󰂑"
#     status_full = "󰁹"
#     low_threshold = 20
#     threshold_type = percentage
# }

volume master {
    format = "<span foreground='#FFFFFF'>󰕾  %volume</span>"
    format_muted = "<span foreground='#404040'>󰝟  MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#808080'>󰃭  %a %d %b   󱑒  %H:%M:%S  </span>"
}
