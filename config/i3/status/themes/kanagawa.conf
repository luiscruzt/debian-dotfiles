# ~/.config/i3/status/themes/kanagawa.conf

general {
    output_format = "i3bar"
    markup = "pango"
    interval = 1
    colors = false 
}

order += "cpu_usage"
order += "cpu_temperature 0"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
# order += "battery all"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#7E9CD8'>󰍛  %usage</span>"
}

cpu_temperature 0 {
    format = "<span foreground='#FFA066'>󰔏  %degrees°C</span>"
    max_threshold = 75
    path = "/sys/devices/platform/coretemp.0/hwmon/hwmon*/temp1_input"
}

memory {
    format = "<span foreground='#98BB6C'>󰘚  %used/%total (%percentage_used)</span>"
}

disk "/" {
    format = "<span foreground='#E6C384'>/:  %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#E6C384'>/home:  %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    format_up = "<span foreground='#7FB4CA'>󰈀  %ip</span>"
    format_down = "<span foreground='#C34043'>󰈀  down</span>"
}

# wireless _first_ {
#     format_up = "<span foreground='#7FB4CA'>󰖩  %ip (%quality)</span>"
#     format_down = "<span foreground='#C34043'>󰖩  down</span>"
# }

# battery all {
#     format = "<span foreground='#D27E99'>%status  %percentage %remaining</span>"
#     format_down = "<span foreground='#C34043'>No battery</span>"
#     status_chr = "󰂄"
#     status_bat = "󰁹"
#     status_unk = "󰂑"
#     status_full = "󰁹"
#     low_threshold = 20
#     threshold_type = percentage
# }

volume master {
    format = "<span foreground='#957FB8'>󰕾  %volume</span>"
    format_muted = "<span foreground='#727169'>󰝟  MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#C6C6C6'>󰃭  %a %d %b   󱑒  %H:%M:%S  </span>"
}
