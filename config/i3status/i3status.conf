# ~/.config/i3status/config

general {
    output_format = "i3bar"
    colors = false
    markup = "pango"
    interval = 1
}

order += "cpu_usage"
order += "memory"
order += "disk /"
order += "disk /home"
order += "ethernet _first_"
# order += "wireless _first_"
order += "volume master"
order += "tztime local"

cpu_usage {
    format = "<span foreground='#89b4fa'>CPU: %usage</span>"
}

memory {
    format = "<span foreground='#a6e3a1'>RAM: %used/%total</span>"
    threshold_degraded = "10%"
    format_degraded = "<span foreground='#f38ba8'>RAM: %free FREE</span>"
}

disk "/" {
    format = "<span foreground='#f9e2af'>/: %used/%total (%percentage_used)</span>"
}

disk "/home" {
    format = "<span foreground='#f9e2af'>/home: %used/%total (%percentage_used)</span>"
}

ethernet _first_ {
    # If using Wi-Fi, swap this for the 'wireless _first_' module
    format_up = "<span foreground='#89dceb'>NET: %ip</span>"
    format_down = "<span foreground='#89dceb'>NET: --</span>"
}

wireless _first_ {
    format_up = "<span foreground='#89dceb'>NET: %ip (%essid)</span>"
    format_down = "<span foreground='#89dceb'>NET: --</span>"
}

volume master {
    format = "<span foreground='#cba6f7'>VOL: %volume</span>"
    format_muted = "<span foreground='#cba6f7'>VOL: MUTE</span>"
    device = "default"
    mixer = "Master"
    mixer_idx = 0
}

tztime local {
    format = "<span foreground='#cdd6f4'>%a %d %b %H:%M:%S </span>"
}
